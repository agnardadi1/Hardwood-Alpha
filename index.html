<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hardwood Alpha | NBA Market Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700;800&family=Rajdhani:wght@500;600;700&display=swap');
      
      body {
        font-family: 'Inter', sans-serif;
        background-color: #020617; /* Slate 950 - Darker background */
        color: #e2e8f0; /* Slate 200 */
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      .font-display {
        font-family: 'Rajdhani', sans-serif;
      }
      
      /* Custom Animations */
      @keyframes stamp-in {
        0% {
          opacity: 0;
          transform: scale(3) rotate(15deg);
          filter: blur(4px);
        }
        50% {
          opacity: 1;
          transform: scale(0.9) rotate(-3deg);
          filter: blur(0px);
        }
        70% {
          transform: scale(1.05) rotate(2deg);
        }
        100% {
          transform: scale(1) rotate(0deg);
        }
      }
      .animate-stamp {
        animation: stamp-in 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
      }

      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #020617;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #334155;
      }
    </style>
 </head>
  <body>
    <div id="root"></div>
 <script type="module" src="/index.tsx"></script>
  </body>
</html>
